# @package _global_
datasplit: "0207"
val_datasplit: "0510"


scratch:
  resolution: 1024
  train_batch_size: 8
  num_train_workers: 16
  num_frames: 1
  # ---------------- no-prompt settings ----------------
  max_num_objects: 1
  # ---------------- no-prompt settings ----------------
  ada_lr: 1.0e-3 # 5.0e-6
  lora_lr: 1.0e-3
  md_lr: 1.0e-3
  phases_per_epoch: 1
  num_epochs: 100
  save_freq: 10 # 0 only last checkpoint is saved.
  checkpoint_path: ./checkpoints/sam2.1_hiera_large.pt # /home/master/12/irisqiu0106/LabelAsus/sam2/sam2_logs/DORA_r16(02070510)/checkpoints/checkpoint_80.pt
  # checkpoint_path: /home/master/12/irisqiu0106/LabelAsus/sam2/sam2_logs/DORA_r16(02070510)_stage2/checkpoints/checkpoint_100.pt
  prompt_mode: none
  peft_linear_mode: rlrr
  lora_r: 16
  experiment_log_dir: ./sam2_logs/RLRR(${datasplit})_stage2 # Path to log directory, defaults to ./sam2_logs/${config_name}
  unfreeze_pattern: rlrr


dataset:
  # PATHS to Dataset
  img_folder: ../data/Eval/val/${datasplit}/train_images # PATH to MOSE JPEGImages folder
  gt_folder: ../data/Eval/val/${datasplit}/train_masks  # PATH to MOSE Annotations folder
  val_img_folder: ../data/Eval/val/${val_datasplit}/test_images 
  val_gt_folder: ../data/Eval/val/${val_datasplit}/test_masks 
  file_list_txt: training/assets/MOSE_sample_train_list.txt # Optional PATH to filelist containing a subset of videos to be used for training
  multiplier: 2


# Video transforms
vos:
  train_transforms:
    - _target_: training.dataset.transforms.ComposeAPI
      transforms:
        - _target_: training.dataset.transforms.RandomHorizontalFlip
          consistent_transform: True
        # ---------------- no-prompt settings ----------------
        - _target_: training.dataset.transforms.RandomVerticalFlip
          consistent_transform: True
        # ---------------- no-prompt settings ----------------
        - _target_: training.dataset.transforms.RandomAffine
          degrees: 25
          shear: 20
          image_interpolation: bilinear
          consistent_transform: True
        # - _target_: training.dataset.transforms.RandomScaleCrop
        #   crop_size: ${scratch.resolution}
        #   scale_range: [0.5, 2.0]
        - _target_: training.dataset.transforms.RandomResizeAPI
          sizes: ${scratch.resolution}
          square: true
          consistent_transform: True
        - _target_: training.dataset.transforms.ToTensorAPI
        - _target_: training.dataset.transforms.NormalizeAPI
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
  val_transforms:
    - _target_: training.dataset.transforms.ComposeAPI
      transforms:
        - _target_: training.dataset.transforms.ResizeAPI
          size: ${scratch.resolution}
          square: true
          consistent_transform: True
        - _target_: training.dataset.transforms.ToTensorAPI
        - _target_: training.dataset.transforms.NormalizeAPI
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

trainer:
  # single GPU
  _target_: training.trainer_single.Trainer
  mode: train_only
  max_epochs: ${times:${scratch.num_epochs},${scratch.phases_per_epoch}}
  accelerator: cuda
  seed_value: 123

  model:
    _target_: training.model.sam2.SAM2Train
    freeze_image_encoder: true
    # ---------------- no-prompt settings ----------------
    freeze_mask_decoder: false
    # ---------------- no-prompt settings ----------------
    unfreeze_pattern: ${scratch.unfreeze_pattern}
    image_encoder:
      _target_: sam2.modeling.backbones.image_encoder.ImageEncoder
      scalp: 1
      trunk:
        _target_: sam2.modeling.backbones.hieradet.Hiera
        embed_dim: 144
        num_heads: 2
        stages: [2, 6, 36, 4]
        global_att_blocks: [23, 33, 43]
        window_pos_embed_bkg_spatial_size: [7, 7]
        window_spec: [8, 4, 16, 8]
        drop_path_rate: 0.1
        # --------------- LoRA and Prompt integration ----------------
        prompt_mode: ${scratch.prompt_mode}
        peft_linear_mode: ${scratch.peft_linear_mode}
        lora_r: ${scratch.lora_r}
      neck:
        _target_: sam2.modeling.backbones.image_encoder.FpnNeck
        position_encoding:
          _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
          num_pos_feats: 256
          normalize: true
          scale: null
          temperature: 10000
        d_model: 256
        backbone_channel_list: [1152, 576, 288, 144]
        fpn_top_down_levels: [2, 3]  # output level 0 and 1 directly use the backbone features
        fpn_interp_model: nearest



    num_maskmem: 0 # modify
    image_size: ${scratch.resolution}
    # apply scaled sigmoid on mask logits for memory encoder, and directly feed input mask as output mask
    sigmoid_scale_for_mem_enc: 20.0
    sigmoid_bias_for_mem_enc: -10.0
    # ---------------- no-prompt settings ----------------
    use_mask_input_as_output_without_sam: false
    non_prompt_mode: true
    # ---------------- no-prompt settings ----------------
    # Memory
    directly_add_no_mem_embed: true
    no_obj_embed_spatial: false # modify
    # use high-resolution feature map in the SAM mask decoder
    use_high_res_features_in_sam: true
    # output 3 masks on the first click on initial conditioning frames
    multimask_output_in_sam: true
    # SAM heads
    iou_prediction_use_sigmoid: True
    # cross-attend to object pointers from other frames (based on SAM output tokens) in the encoder
    use_obj_ptrs_in_encoder: false # modify
    add_tpos_enc_to_obj_ptrs: false # modify
    proj_tpos_enc_in_obj_ptrs: false # modify
    use_signed_tpos_enc_to_obj_ptrs: false # modify
    only_obj_ptrs_in_the_past_for_eval: false # modify
    # object occlusion prediction
    pred_obj_scores: false # modify
    pred_obj_scores_mlp: false # modify
    fixed_no_obj_ptr: false # modify
    # multimask tracking settings
    multimask_output_for_tracking: false # modify
    use_multimask_token_for_obj_ptr: false # modify
    multimask_min_pt_num: 0
    multimask_max_pt_num: 1
    use_mlp_for_obj_ptr_proj: true # modify
    # Compilation flag
    # compile_image_encoder: False

    ####### Training specific params #######
    # box/point input and corrections
    # ---------------- no-prompt settings ----------------
    prob_to_use_pt_input_for_train: 0.0
    prob_to_use_pt_input_for_eval: 0.0
    prob_to_use_box_input_for_train: 0.0
    prob_to_use_box_input_for_eval: 0.0
    # ---------------- no-prompt settings ----------------

    # prob_to_sample_from_gt_for_train: 0.1  # with a small prob, sampling correction points from GT mask instead of prediction errors
    # num_frames_to_correct_for_train: 2  # iteratively sample on random 1~2 frames (always include the first frame)
    # num_frames_to_correct_for_eval: 1  # only iteratively sample on first frame
    # rand_frames_to_correct_for_train: True  # random #init-cond-frame ~ 2
    # add_all_frames_to_correct_as_cond: True  # when a frame receives a correction click, it becomes a conditioning frame (even if it's not initially a conditioning frame)
    # # maximum 2 initial conditioning frames
    # num_init_cond_frames_for_train: 2
    # rand_init_cond_frames_for_train: True  # random 1~2
    # num_correction_pt_per_frame: 7
    # use_act_ckpt_iterative_pt_sampling: false
    
    # num_init_cond_frames_for_eval: 1  # only mask on the first frame
    # forward_backbone_per_frame_for_eval: True

  data:
    train:
      # single GPU
      _target_: training.dataset.sam2_datasets.TorchTrainMixedDataset_Single
      phases_per_epoch: ${scratch.phases_per_epoch}
      batch_sizes:
        - ${scratch.train_batch_size}
      datasets:
        - _target_: training.dataset.vos_dataset.VOSDataset
          transforms: ${vos.train_transforms}
          training: true
          video_dataset:
            _target_: training.dataset.vos_raw_dataset.SingleFrameRawDataset
            img_folder: ${dataset.img_folder}
            gt_folder: ${dataset.gt_folder}
            # ----------- no-prompt settings ----------------
            multi_instance: false
            # ----------- no-prompt settings ----------------
          sampler:
            # ----------- no-prompt settings ----------------
            _target_: training.dataset.vos_sampler.SingleFrameSampler
            max_num_objects: ${scratch.max_num_objects}
            # ----------- no-prompt settings ----------------
          multiplier: ${dataset.multiplier}

      shuffle: True
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: True
      collate_fn:
        _target_: training.utils.data_utils.collate_fn
        _partial_: true
        dict_key: all
    
    val:
      _target_: training.dataset.vos_dataset.VOSDataset
      transforms: ${vos.val_transforms}
      training: false
      video_dataset:
        _target_: training.dataset.vos_raw_dataset.SingleFrameRawDataset
        img_folder: ${dataset.val_img_folder}
        gt_folder: ${dataset.val_gt_folder}
        file_list_txt: ${dataset.file_list_txt}
      sampler:
        _target_: training.dataset.vos_sampler.SingleFrameSampler
        max_num_objects: ${scratch.max_num_objects}
      shuffle: False
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: False
      collate_fn:
        _target_: training.utils.data_utils.collate_fn
        _partial_: true
        dict_key: all


  optim:
    amp:
      enabled: True
      amp_dtype: bfloat16

    optimizer:
      _target_: torch.optim.AdamW

    gradient_clip:
      _target_: training.optimizer.GradientClipper
      max_norm: 0.1
      norm_type: 2

    options:
      lr:
        # # --- Group 1: prompt_generator, 大一點的 learning rate
        # - scheduler:
        #     _target_: fvcore.common.param_scheduler.CosineParamScheduler
        #     start_value: ${scratch.ada_lr}
        #     end_value: 1e-5
        #   param_names:
        #     - "image_encoder.trunk.prompt_generator.*"

        # ---------- Group 2: LoRA  ----------
        - scheduler:
            _target_: fvcore.common.param_scheduler.CosineParamScheduler
            start_value: ${scratch.lora_lr}
            end_value: 5e-6
          param_names:
            - "image_encoder.trunk.blocks.*rlrr_*"
        # ---------- Group 3: mask_decoder ----------
        - scheduler:
            _target_: fvcore.common.param_scheduler.CosineParamScheduler
            start_value: ${scratch.md_lr}
            end_value: 5e-6
          param_names:
            - "sam_mask_decoder.*"
  loss:
    all:
      _target_: training.loss_fns.MultiStepMultiMasksAndIous
      weight_dict:
        loss_mask: 20
        loss_dice: 1
        loss_iou: 1
      supervise_all_iou: true
      iou_use_l1_loss: true
      pred_obj_scores: false
      focal_gamma_obj_score: 0.0
      focal_alpha_obj_score: -1.0

  distributed:
    backend: nccl
    find_unused_parameters: True

  logging:
    tensorboard_writer:
      _target_: training.utils.logger.make_tensorboard_logger
      log_dir:  ${scratch.experiment_log_dir}/tensorboard
      flush_secs: 120
      should_log: True
    log_dir: ${scratch.experiment_log_dir}/logs
    log_freq: 10

  # initialize from a SAM 2 checkpoint
  checkpoint:
    save_dir: ${scratch.experiment_log_dir}/checkpoints
    save_freq: ${scratch.save_freq}
    model_weight_initializer:
      _partial_: True
      _target_: training.utils.checkpoint_utils.load_state_dict_into_model
      strict: False # modify
      ignore_unexpected_keys:
        - "no_obj_ptr"
        - "mask_downsample.*"
        - "no_obj_embed_spatial"
        - "obj_ptr_proj.*"
        - "obj_ptr_tpos_proj.*"
        - "maskmem_tpos_enc"
        - "sam_mask_decoder.pred_obj_score_head.*"
        - "sam_mask_decoder.obj_score_token.*"
        - "memory_encoder.*"
        - "memory_attention.*"
      ignore_missing_keys:
        # - "image_encoder.trunk.prompt_generator.*"

      state_dict:
        _target_: training.utils.checkpoint_utils.load_checkpoint_and_apply_kernels
        checkpoint_path: ${scratch.checkpoint_path}
        ckpt_state_dict_keys: ['model']


launcher:
  num_nodes: 1
  gpus_per_node: 2
  experiment_log_dir: ${scratch.experiment_log_dir}


# SLURM args if running on a cluster
submitit:
  partition: null
  account: null
  qos: null
  cpus_per_task: 10
  use_cluster: false
  timeout_hour: 24
  name: null
  port_range: [10000, 65000]

